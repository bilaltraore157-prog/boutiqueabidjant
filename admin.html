<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ajouter un iPhone</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="admin-container">
        <h2>Ajouter un téléphone</h2>
        <form id="add-phone-form">
            <!-- Sélection de la photo -->
           <label>Photos du téléphone (sélectionne plusieurs images) :</label>
<input type="file" id="phone-photo" accept="image/*" multiple required>

            <label>Modèle :</label>
            <input type="text" id="phone-model" placeholder="ex: iPhone 15 Pro" required>

            <label>Prix (FCFA) :</label>
            <input type="number" id="phone-price" placeholder="750000" required>

            <!-- Cases à cocher pour l'état -->
           <!-- Dans admin.html -->
<div class="status-selection">
    <label>État du produit :</label>
    <div class="radio-group">
        <input type="radio" id="new" name="condition" value="Nouveau" checked>
        <label for="new">Nouveau (Carton)</label>
    </div>
    <div class="radio-group">
        <input type="radio" id="used" name="condition" value="Seconde main">
        <label for="used">Seconde main (Occasion)</label>
    </div>
</div>

            <label>Description :</label>
            <textarea id="phone-desc" placeholder="Capacité, état batterie, etc..."></textarea>

            <!-- Dans admin.html -->
<form id="add-phone-form"> 
   <!-- tes inputs ici -->
   <button type="submit">Publier sur le site</button>
</form>
        </form>
    </div>
     <nav class="fb-nav">
       <!-- Dans ta barre de navigation basse -->

        <a href="index.html" class="active"><i class="fas fa-home"></i></a>
        <a href="admin.html" class="nav-item">
    <i class="fas fa-store"></i>
</a> 
        
        <a href="#"><i class="fas fa-info-circle"></i></a>
    </nav>
    <!-- À mettre tout en bas de admin.html -->
    <script src="JS/admin.js"></script> 


</body>
</html>
